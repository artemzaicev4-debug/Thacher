<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>Факти</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100">

<header class="bg-gray-800 text-white p-4 text-center">
  <h1>Цікаві факти</h1>
</header>
<body class="relative min-h-screen text-white">

  <div class="fixed inset-0 bg-[url('https://upload.wikimedia.org/wikipedia/commons/thumb/d/d7/House_of_Commons_Chamber_1.png/1280px-House_of_Commons_Chamber_1.png')] bg-cover bg-center blur-sm -z-10"></div>

  <div class="fixed inset-0 bg-black/50 -z-10"></div>

  </div>
<body style="font-family: 'Times New Roman', serif;">

<main class="max-w-3xl mx-auto p-6 bg-white mt-6 rounded-xl shadow text-center">
  <button onclick="showFact()" class="bg-blue-600 text-white px-4 py-2 rounded-xl">Показати факт</button>
  <p id="fact" class="mt-4 text-lg"></p>
</main>

<script>
function showFact() {
  const facts = [
    "Маргарет Тетчер стала першою жінкою, яка очолила уряд Об’єднаного Королівства у 1979 році. Це було історичне досягнення, адже до цього політика на найвищому рівні майже повністю контролювалася чоловіками. Її успіх відкрив шлях іншим жінкам у політиці не лише у Великій Британії, а й у всьому світі.",
    "Прізвисько «Залізна леді» вперше з’явилося у 1976 році в радянській газеті “Красная Звезда” після її різкої критики Радянського Союзу. Спочатку це було задумано як критика, але згодом Тетчер прийняла це прізвисько і воно стало символом її сили, рішучості та непохитності.",
    " Вона навчалася в Оксфордському Університеті, де вивчала хімію. Після закінчення університету працювала хіміком-дослідником. Зокрема, вона брала участь у розробках у харчовій промисловості. Її наукове мислення допомогло їй у майбутньому приймати логічні та структуровані рішення.",
    " Її батько, власник крамниці, був дуже дисциплінованою та принциповою людиною. Саме він прищепив їй такі риси, як працьовитість, самостійність і відповідальність. З дитинства вона допомагала в магазині, що сформувало її розуміння економіки та життя звичайних людей.",
    "Тетчер очолювала уряд понад 11 років (1979–1990), що зробило її найдовшим прем’єр-міністром Великої Британії у XX столітті. Така тривалість перебування при владі свідчить про її сильне політичне становище та підтримку в різні періоди.",
    " Під час цієї війни багато хто сумнівався в успіху Великої Британії через віддаленість островів і складність операції. Проте рішучість Тетчер призвела до перемоги, що значно підвищило її популярність і зміцнило її імідж сильного лідера.",
    "Вона мала дуже близькі політичні відносини з президентом США Рональдом Рейганом. Їх об’єднували спільні погляди на економіку та міжнародну політику. Разом вони відігравали важливу роль у глобальних процесах кінця Холодної війни.",
    "Вона була одружена з бізнесменом Денісом Тетчером, який підтримував її протягом усього життя. У 1953 році у них народилися близнюки — Марк і Керол. Попри напружену кар’єру, сім’я залишалася важливою частиною її життя.",
    "У 1984 році під час конференції Консервативної партії в готелі в Брайтоні стався вибух, організований ІРА. Тетчер дивом вижила і вже наступного дня продовжила роботу, що ще раз підкреслило її стійкість і рішучість.",
    "На початку кар’єри її голос вважали недостатньо впевненим. Вона спеціально працювала з фахівцями, щоб зробити його глибшим і більш авторитетним. Також вона ретельно стежила за зовнішнім виглядом, розуміючи важливість іміджу в політиці.",
    "Після завершення політичної діяльності вона отримала титул баронеси і стала членом Палати лордів, що дозволило їй залишатися впливовою фігурою в суспільному житті.",
    "Її політика була настільки значущою, що з’явився окремий термін — «тетчеризм». Він описує її економічні та політичні підходи, які досі обговорюються і вивчаються."
  ];
  document.getElementById("fact").innerText = facts[Math.floor(Math.random()*facts.length)];
}
</script>
